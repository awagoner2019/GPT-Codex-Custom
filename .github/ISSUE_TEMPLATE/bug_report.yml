name: Bug report
description: Report reproducible incorrect behavior in the custom interface or tooling.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not attach `profile/`, `logs/`, `work/`, `vendor/`, credentials, cookies, or private chat content.
  - type: input
    id: custom_version
    attributes:
      label: Custom version
      description: The version in package.json.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: upstream_version
    attributes:
      label: Installed upstream version
      description: Package and app versions from upstream.json.
      placeholder: Package 26.x; app 26.x
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Product mode
      options:
        - Chat
        - Work
        - Codex
        - Launcher, updater, or build tooling
        - Cross-mode or unknown
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: Tell us exactly what you selected and what happened.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification output
      description: Paste sanitized output from npm run verify or the relevant diagnostic check.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Privacy check
      options:
        - label: I removed account data, chat content, credentials, cookies, personal paths, and other private information.
          required: true
